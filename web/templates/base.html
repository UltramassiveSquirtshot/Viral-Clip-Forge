<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viral Clip Forge{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; }
    .badge-ok   { background: #166534; color: #bbf7d0; }
    .badge-warn { background: #78350f; color: #fde68a; }
    .badge-err  { background: #7f1d1d; color: #fecaca; }
    .badge-blue { background: #1e3a5f; color: #93c5fd; }
    .badge      { border-radius: 0.375rem; padding: 0.15rem 0.5rem; font-size: 0.75rem; font-weight: 600; }
    .btn { cursor: pointer; border-radius: 0.5rem; padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 600; border: none; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-green  { background: #16a34a; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #15803d; }
    .btn-blue   { background: #2563eb; color: #fff; }
    .btn-blue:hover:not(:disabled) { background: #1d4ed8; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn-red:hover:not(:disabled) { background: #b91c1c; }
    .btn-gray   { background: #475569; color: #fff; }
    .btn-gray:hover:not(:disabled) { background: #334155; }
    #log-panel { background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.78rem; line-height: 1.5; max-height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .step-dot { width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .step-active { background: #2563eb; color: #fff; }
    .step-done   { background: #166534; color: #bbf7d0; }
    .step-idle   { background: #334155; color: #94a3b8; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; color: #64748b; padding: 0.3rem 0.5rem; border-bottom: 1px solid #334155; }
    td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #1e293b; }
    .theme-card { border: 2px solid #334155; border-radius: 0.5rem; padding: 0.75rem 1rem; cursor: pointer; transition: all 0.15s; }
    .theme-card:hover { border-color: #2563eb; background: #1e3a5f22; }
    .theme-card.selected { border-color: #2563eb; background: #1e3a5f55; }
    .video-card { border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; cursor: pointer; transition: all 0.15s; }
    .video-card:hover { border-color: #16a34a; background: #16653422; }
    .video-card.selected { border-color: #16a34a; background: #16653455; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="border-b border-slate-700 px-6 py-3 flex items-center gap-6 bg-slate-900">
    <span class="font-bold text-white text-lg tracking-tight">🎬 Viral Clip Forge</span>
    <a href="/" class="text-sm text-slate-300 hover:text-white {% if request.path == '/' %}text-white font-semibold{% endif %}">Dashboard</a>
    <a href="/ranker" class="text-sm text-slate-300 hover:text-white {% if request.path == '/ranker' %}text-white font-semibold{% endif %}">Ranker</a>
    <a href="/ai-shorts" class="text-sm text-slate-300 hover:text-white {% if request.path == '/ai-shorts' %}text-white font-semibold{% endif %}">AI Shorts</a>
    <span class="ml-auto text-xs text-slate-500" id="clock"></span>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Shared log panel (hidden by default) -->
  <div id="log-container" class="fixed bottom-0 left-0 right-0 max-w-5xl mx-auto px-4 pb-4" style="display:none">
    <div class="card">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-semibold text-slate-300">Output</span>
        <button onclick="closeLog()" class="btn btn-gray text-xs px-2 py-1">✕ Chiudi</button>
      </div>
      <div id="log-panel"></div>
    </div>
  </div>

  <script>
    // Clock
    const clock = document.getElementById('clock');
    function tick() { clock.textContent = new Date().toLocaleTimeString('it-IT'); }
    tick(); setInterval(tick, 1000);

    // Log panel
    let _sse = null;
    function openLog() {
      document.getElementById('log-container').style.display = 'block';
    }
    function closeLog() {
      document.getElementById('log-container').style.display = 'none';
      if (_sse) { _sse.close(); _sse = null; }
    }
    function streamJob(jobId, onDone) {
      const panel = document.getElementById('log-panel');
      panel.textContent = '';
      openLog();
      if (_sse) _sse.close();
      _sse = new EventSource('/stream/' + jobId);
      _sse.onmessage = function(e) {
        if (e.data.startsWith('[DONE')) {
          _sse.close(); _sse = null;
          panel.textContent += '\n' + e.data;
          if (onDone) onDone();
        } else {
          panel.textContent += e.data + '\n';
          panel.scrollTop = panel.scrollHeight;
        }
      };
      _sse.onerror = function() { _sse.close(); _sse = null; };
    }

    // Generic action helper: POST → get job_id → stream
    async function runAction(url, body, btn, onDone) {
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body || {}),
        });
        const data = await res.json();
        if (data.error) {
          alert('Errore: ' + data.error);
          if (btn) btn.disabled = false;
          return;
        }
        streamJob(data.job_id, () => {
          if (btn) btn.disabled = false;
          if (onDone) onDone();
        });
      } catch(e) {
        alert('Errore di rete: ' + e);
        if (btn) btn.disabled = false;
      }
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
